<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruitment | Makarizo Beauty Advisor</title>
    <link rel="icon" href="assets/icon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        orange: { 50: '#fff7ed', 100: '#ffedd5', 500: '#f97316', 600: '#ea580c', 700: '#c2410c' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .whatsapp-gradient {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
        }
    </style>
</head>

<body class="bg-white text-slate-900">

    <nav class="max-w-6xl mx-auto px-6 py-6 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <img src="assets/logo.png" alt="Makarizo Logo" class="w-32 h-auto">
        </div>
        <div class="hidden md:block text-sm text-slate-500 font-medium uppercase tracking-widest" id="nav-company">
        </div>
    </nav>

    <header class="max-w-6xl mx-auto px-6 pt-12 pb-20 grid md:grid-cols-2 gap-12 items-center">
        <div>
            <span
                class="inline-block px-4 py-1.5 bg-orange-100 text-orange-700 rounded-full text-xs font-bold uppercase tracking-wider mb-6"
                id="placement-span"></span>
            <h1 class="text-5xl md:text-6xl font-extrabold leading-tight mb-6" id="hero-title"></h1>
            <p class="text-lg text-slate-600 mb-8 leading-relaxed" id="hero-desc"></p>
            <a href="#rules"
                class="inline-block bg-orange-600 hover:bg-orange-700 text-white font-bold px-10 py-4 rounded-2xl transition-all shadow-xl hover:shadow-orange-200">
                Lihat Aturan Daftar
            </a>
        </div>
        <div class="relative">
            <div class="absolute -inset-4 bg-orange-100 rounded-full blur-3xl opacity-50"></div>
            <div class="relative bg-white p-8 rounded-3xl shadow-2xl border border-slate-100">
                <div class="flex items-center gap-4 mb-6">
                    <div class="w-12 h-12 whatsapp-gradient rounded-full flex items-center justify-center text-white">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.025 3.128l-.904 3.313 3.385-.888c.828.452 1.741.69 2.261.691h.001c3.182 0 5.767-2.587 5.768-5.766 0-3.18-2.586-5.765-5.768-5.765zm3.425 8.127c-.147.414-.851.761-1.171.808-.321.047-.638.083-1.834-.393-1.49-.594-2.446-2.108-2.52-2.206-.074-.099-.61-1.112-.61-1.57s.241-.684.327-.86c.086-.176.188-.22.251-.22h.163c.063 0 .146-.024.23.176.084.2.287.7.311.75s.039.106.01.165c-.03.06-.051.107-.101.165-.051.058-.106.13-.151.174-.05.048-.103.1-.044.201.058.102.261.431.562.698.388.344.715.45.817.493.102.043.162.036.222-.033.061-.069.258-.3.327-.403.069-.102.138-.086.233-.05.095.035.6.284.704.335s.172.086.197.13c.026.044.026.255-.121.669z" />
                        </svg>
                    </div>
                    <div>
                        <p class="font-bold text-slate-800">WhatsApp Recruitment Bot</p>
                        <p class="text-xs text-green-600 font-semibold">Online & Automated</p>
                    </div>
                </div>
                <div class="space-y-4" id="wa-preview">
                </div>
            </div>
        </div>
    </header>

    <main class="bg-slate-50 py-24">
        <div class="max-w-6xl mx-auto px-6 grid md:grid-cols-2 gap-16">

            <section id="rules">
                <h2 class="text-3xl font-bold mb-8 flex items-center gap-3">
                    <span
                        class="w-10 h-10 bg-orange-600 text-white rounded-full flex items-center justify-center text-lg">!</span>
                    Aturan Pendaftaran
                </h2>
                <div class="space-y-6" id="rules-list">
                </div>
            </section>

            <section>
                <h2 class="text-3xl font-bold mb-8">Kualifikasi</h2>
                <div class="grid gap-4" id="qual-list">
                </div>
            </section>

        </div>
    </main>

    <section class="py-24 text-center">
        <div class="max-w-3xl mx-auto px-6">
            <h2 class="text-4xl font-extrabold mb-6 italic">Siap untuk Upgrade?</h2>
            <p class="text-slate-600 mb-10">Pastikan Anda memiliki koneksi internet yang stabil dan aplikasi WhatsApp
                yang ter-update.</p>
            <div class="inline-flex flex-col items-center">
                <a class="whatsapp-gradient text-white font-bold px-12 py-5 rounded-full text-xl shadow-2xl hover:scale-105 transition-transform inline-flex items-center gap-3 mb-6"
                    id="chat-now-btn">
                    Mulai Chat Sekarang
                </a>
            </div>
        </div>
    </section>

    <footer class="bg-slate-900 py-12 text-center text-slate-500">
        <p id="footer-copy" class="text-sm mb-2"></p>
        <p class="text-[10px] tracking-widest uppercase opacity-50">Powered by AI Recruitment System</p>
    </footer>

    <script>
        const appData = {
            nav: "PT Akasha Wira International Tbk",
            penempatan: "Penempatan: Seluruh Indonesia",
            hero: {
                title: "Beauty Advisor Recruitment",
                desc: "Jadilah wajah dari brand Makarizo. Proses pendaftaran kami kini lebih cepat dan transparan melalui sistem seleksi otomatis via WhatsApp."
            },
            chatNowLink: "https://wa.me/6281120261010?text=Halo%2C%20saya%20ingin%20melamar%20untuk%20posisi%20%5BAKASHA%3AMKZ-BA-2026%5D.%20Terima%20kasih!%20%F0%9F%91%8B%E2%9C%A8",
            rules: [
                { title: "Gunakan Nomor Pribadi", desc: "Pastikan nomor WhatsApp yang Anda gunakan adalah milik pribadi untuk verifikasi identitas." },
                { title: "Respon Cepat", desc: "Sistem akan memberikan pertanyaan satu per satu. Balas dengan singkat dan jelas sesuai instruksi." },
                { title: "Dokumen Digital", desc: "Siapkan foto diri dan resume dalam format gambar atau PDF untuk diunggah di tengah percakapan." },
                { title: "Satu Kali Pendaftaran", desc: "Satu nomor WhatsApp hanya berlaku untuk satu kali proses screening per periode." }
            ],
            qualifications: [
                "Wanita, Berpenampilan Menarik",
                "Min. Pendidikan SMA/SMK Sederajat",
                "Percaya Diri & Komunikatif",
                "Berpengalaman sebagai Beauty Advisor",
                "Memiliki HP Android"
            ],
            chatPreview: [
                { sender: "bot", msg: "Halo! Saya asisten rekrutmen Makarizo. Siap memulai screening untuk posisi Beauty Advisor?" },
                { sender: "user", msg: "Siap, saya berminat!" },
                { sender: "bot", msg: "Bagus! Pertama, silakan ketik Nama Lengkap Anda sesuai KTP." }
            ]
        };

        function initPage() {
            // document.getElementById('nav-company').innerText = appData.nav;
            document.getElementById('hero-title').innerText = appData.hero.title;
            document.getElementById('hero-desc').innerText = appData.hero.desc;
            document.getElementById('footer-copy').innerText = `© 2026 ${appData.nav}. All Rights Reserved.`;
            document.getElementById('placement-span').innerText = appData.penempatan;
            document.getElementById('chat-now-btn').href = appData.chatNowLink;
            // Render Rules
            const rulesContainer = document.getElementById('rules-list');
            appData.rules.forEach((rule, index) => {
                rulesContainer.innerHTML += `
                    <div class="flex gap-4">
                        <span class="font-bold text-orange-600">0${index + 1}.</span>
                        <div>
                            <h4 class="font-bold text-slate-800">${rule.title}</h4>
                            <p class="text-sm text-slate-500 leading-relaxed">${rule.desc}</p>
                        </div>
                    </div>
                `;
            });

            // Render Qualifications
            const qualContainer = document.getElementById('qual-list');
            appData.qualifications.forEach(q => {
                qualContainer.innerHTML += `
                    <div class="bg-white p-4 rounded-xl border border-slate-200 flex items-center gap-3 font-semibold text-slate-700">
                        <div class="w-2 h-2 bg-orange-500 rounded-full"></div> ${q}
                    </div>
                `;
            });

            // Render Chat Preview
            const chatContainer = document.getElementById('wa-preview');
            appData.chatPreview.forEach(chat => {
                const align = chat.sender === 'bot' ? 'justify-start' : 'justify-end';
                const color = chat.sender === 'bot' ? 'bg-slate-100 text-slate-800' : 'bg-green-100 text-slate-800';
                chatContainer.innerHTML += `
                    <div class="flex ${align}">
                        <div class="max-w-[80%] p-3 rounded-2xl text-xs ${color} shadow-sm">
                            ${chat.msg}
                        </div>
                    </div>
                `;
            });
        }

        window.onload = initPage;
    </script>
</body>

</html>
