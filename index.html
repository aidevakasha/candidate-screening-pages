<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruitment | Makarizo Beauty Advisor</title>
    <link rel="icon" href="assets/icon.webp" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        orange: { 50: '#fff7ed', 100: '#ffedd5', 500: '#f97316', 600: '#ea580c', 700: '#c2410c' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .whatsapp-gradient {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
        }
    </style>
</head>

<body class="bg-white text-slate-900">

    <nav class="max-w-6xl mx-auto px-6 py-6 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <img src="assets/logo.webp" alt="Makarizo Logo" class="w-32 h-auto">
        </div>
        <div class="hidden md:block text-sm text-slate-500 font-medium uppercase tracking-widest" id="nav-company">
        </div>
    </nav>

    <header class="max-w-6xl mx-auto px-6 pt-8 pb-12 grid md:grid-cols-2 gap-8 items-center">
        <div>
            <span
                class="inline-block px-4 py-1.5 bg-orange-100 text-orange-700 rounded-full text-xs font-bold uppercase tracking-wider mb-4"
                id="placement-span"></span>
            <h1 class="text-5xl md:text-6xl font-extrabold leading-tight mb-4" id="hero-title"></h1>
            <p class="text-lg text-slate-600 mb-6 leading-relaxed" id="hero-desc"></p>
            <a href="#rules"
                class="inline-block bg-orange-600 hover:bg-orange-700 text-white font-bold px-10 py-4 rounded-2xl transition-all shadow-xl hover:shadow-orange-200">
                Lihat Aturan Daftar
            </a>
        </div>
        <div class="relative">
            <div class="absolute -inset-4 bg-orange-100 rounded-full blur-3xl opacity-50"></div>
            <div class="relative bg-white p-8 rounded-3xl shadow-2xl border border-slate-100">
                <div class="flex items-center gap-4 mb-6">
                    <div class="w-12 h-12 whatsapp-gradient rounded-full flex items-center justify-center text-white">
                        <?xml version="1.0" encoding="UTF-8" standalone="no"?>
                        <!--License: Logo.-->

                                Created with Sketch.

                            <defs />

                                        d="M723.993033,360 C710.762252,360 700,370.765287 700,383.999801 C700,389.248451 701.692661,394.116025 704.570026,398.066947 L701.579605,406.983798 L710.804449,404.035539 C714.598605,406.546975 719.126434,408 724.006967,408 C737.237748,408 748,397.234315 748,384.000199 C748,370.765685 737.237748,360.000398 724.006967,360.000398 L723.993033,360.000398 L723.993033,360 Z M717.29285,372.190836 C716.827488,371.07628 716.474784,371.034071 715.769774,371.005401 C715.529728,370.991464 715.262214,370.977527 714.96564,370.977527 C714.04845,370.977527 713.089462,371.245514 712.511043,371.838033 C711.806033,372.557577 710.056843,374.23638 710.056843,377.679202 C710.056843,381.122023 712.567571,384.451756 712.905944,384.917648 C713.258648,385.382743 717.800808,392.55031 724.853297,395.471492 C730.368379,397.757149 732.00491,397.545307 733.260074,397.27732 C735.093658,396.882308 737.393002,395.527239 737.971421,393.891043 C738.54984,392.25405 738.54984,390.857171 738.380255,390.560912 C738.211068,390.264652 737.745308,390.095816 737.040298,389.742615 C736.335288,389.389811 732.90737,387.696673 732.25849,387.470894 C731.623543,387.231179 731.017259,387.315995 730.537963,387.99333 C729.860819,388.938653 729.198006,389.89831 728.661785,390.476494 C728.238619,390.928051 727.547144,390.984595 726.969123,390.744481 C726.193254,390.420348 724.021298,389.657798 721.340985,387.273388 C719.267356,385.42535 717.856938,383.125756 717.448104,382.434484 C717.038871,381.729275 717.405907,381.319529 717.729948,380.938852 C718.082653,380.501232 718.421026,380.191036 718.77373,379.781688 C719.126434,379.372738 719.323884,379.160897 719.549599,378.681068 C719.789645,378.215575 719.62006,377.735746 719.450874,377.382942 C719.281687,377.030139 717.871269,373.587317 717.29285,372.190836 Z"
                                        id="Whatsapp" />
                                </g>
                            </g>
                        </svg>

                    </div>
                    <div>
                        <p class="font-bold text-slate-800">WhatsApp Recruitment Bot</p>
                        <p class="text-xs text-green-600 font-semibold">Online & Automated</p>
                    </div>
                </div>
                <div class="space-y-4" id="wa-preview">
                </div>
            </div>
        </div>
    </header>

    <main class="bg-slate-50 py-2">
        <div class="max-w-6xl mx-auto px-6">
            <div class="relative mb-8 md:mb-8 md:w-1/2 mx-auto overflow-hidden rounded-3xl">
                <img src="assets/model.webp" alt="Tim Beauty Advisor Makarizo" class="w-full h-auto drop-shadow-xl">
            </div>

            <div class="grid md:grid-cols-2 gap-8 pt-2">
                <section id="rules" class="pt-8">
                    <h2 class="text-3xl font-bold mb-4 flex items-center gap-3">
                        <span
                            class="w-10 h-10 bg-orange-600 text-white rounded-full flex items-center justify-center text-lg">!</span>
                        Aturan Pendaftaran
                    </h2>
                    <div class="space-y-4" id="rules-list">
                    </div>
                </section>

                <section id="qualifications" class="pt-8">
                    <h2 class="text-3xl font-bold mb-4">Kualifikasi</h2>
                    <div class="grid gap-3" id="qual-list">
                    </div>
                </section>
            </div>
        </div>
    </main>

    <section class="py-4 mb-2 text-center">
        <div class="max-w-3xl mx-auto px-6">
            <h2 class="text-4xl font-extrabold mb-4">Siap untuk Upgrade?</h2>
            <p class="text-slate-600 mb-6">Pastikan Anda memiliki koneksi internet yang stabil dan aplikasi WhatsApp
                yang ter-update.</p>
            <div class="inline-flex flex-col items-center">
                <a class="whatsapp-gradient text-white font-bold px-12 py-5 rounded-full text-xl shadow-2xl hover:scale-105 transition-transform inline-flex items-center gap-3"
                    id="chat-now-btn">
                    Mulai Chat Sekarang
                </a>
            </div>
        </div>
    </section>

    <footer class="bg-slate-900 py-12 text-center text-slate-500">
        <p id="footer-copy" class="text-sm mb-2"></p>
        <p class="text-[10px] tracking-widest uppercase opacity-50">Powered by AI Recruitment System</p>
    </footer>

    <script>
        const appData = {
            "nav": "PT Akasha Wira International Tbk",
            "penempatan": "Penempatan: Seluruh Indonesia",
            "hero": {
                "title": "Beauty Advisor Recruitment",
                "desc": "Jadilah wajah dari brand Makarizo. Proses pendaftaran kami kini lebih cepat dan transparan melalui sistem seleksi otomatis via WhatsApp."
            },
            "chatNowLink": "https://wa.me/6281120261010?text=Halo%2C%20saya%20ingin%20melamar%20untuk%20posisi%20%5BAKASHA%3AMKZ-BA-2026%5D.%20Terima%20kasih!%20",
            "rules": [
                { "title": "Gunakan Nomor Pribadi", "desc": "Pastikan nomor WhatsApp yang Anda gunakan adalah milik pribadi untuk verifikasi identitas." },
                { "title": "Respon Cepat", "desc": "Sistem akan memberikan pertanyaan satu per satu. Balas dengan singkat dan jelas sesuai instruksi." },
                { "title": "Dokumen Digital", "desc": "Siapkan foto diri dan resume dalam format gambar atau PDF untuk diunggah di tengah percakapan." },
                { "title": "Satu Kali Pendaftaran", "desc": "Satu nomor WhatsApp hanya berlaku untuk satu kali proses screening per periode." }
            ],
            "qualifications": ["Wanita, Berpenampilan Menarik", "Min. Pendidikan SMA/SMK Sederajat", "Percaya Diri & Komunikatif", "Berpengalaman sebagai Beauty Advisor", "Memiliki HP Android"],
            "chatPreview": [
                { "sender": "bot", "msg": "Halo! Saya asisten rekrutmen Makarizo. Siap memulai screening untuk posisi Beauty Advisor?" },
                { "sender": "user", "msg": "Siap, saya berminat!" },
                { "sender": "bot", "msg": "Bagus! Pertama, silakan ketik Nama Lengkap Anda sesuai KTP." }
            ]
        };

        function initPage() {
            document.getElementById('hero-title').innerText = appData.hero.title;
            document.getElementById('hero-desc').innerText = appData.hero.desc;
            document.getElementById('footer-copy').innerText = `© 2026 ${appData.nav}. All Rights Reserved.`;
            document.getElementById('placement-span').innerText = appData.penempatan;
            document.getElementById('chat-now-btn').href = appData.chatNowLink;

            // Render Rules
            const rulesContainer = document.getElementById('rules-list');
            appData.rules.forEach((rule, index) => {
                rulesContainer.innerHTML += `
                    <div class="flex gap-4">
                        <span class="font-bold text-orange-600">0${index + 1}.</span>
                        <div>
                            <h4 class="font-bold text-slate-800">${rule.title}</h4>
                            <p class="text-sm text-slate-500 leading-relaxed">${rule.desc}</p>
                        </div>
                    </div>
                `;
            });

            // Render Qualifications
            const qualContainer = document.getElementById('qual-list');
            appData.qualifications.forEach(q => {
                qualContainer.innerHTML += `
                    <div class="bg-white p-4 rounded-xl border border-slate-200 flex items-center gap-3 font-semibold text-slate-700">
                        <div class="w-2 h-2 bg-orange-500 rounded-full"></div> ${q}
                    </div>
                `;
            });

            // Render Chat Preview
            const chatContainer = document.getElementById('wa-preview');
            appData.chatPreview.forEach(chat => {
                const align = chat.sender === 'bot' ? 'justify-start' : 'justify-end';
                const color = chat.sender === 'bot' ? 'bg-slate-100 text-slate-800' : 'bg-green-100 text-slate-800';
                chatContainer.innerHTML += `
                    <div class="flex ${align}">
                        <div class="max-w-[80%] p-3 rounded-2xl text-xs ${color} shadow-sm">
                            ${chat.msg}
                        </div>
                    </div>
                `;
            });
        }

        window.onload = initPage;
    </script>
</body>

</html>
